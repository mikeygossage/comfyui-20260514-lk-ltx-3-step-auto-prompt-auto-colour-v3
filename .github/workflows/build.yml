name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          build-contexts: |
            localmodels=D:/ai/ComfyUI_APR2026/ComfyUI/models
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ltx23-comfyui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ltx23-comfyui:${{ github.sha }}
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=local,src=C:/docker-cache
          cache-to: type=local,dest=C:/docker-cache,mode=max
